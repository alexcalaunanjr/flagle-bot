app = "flagle-bot"
primary_region = "sin"  # Singapore — change to nearest region

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  PORT = "8000"
  BOT_MODE = "webhook"
